<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Isaac BlockCraft Learning Quest</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial,sans-serif;background:#8fd3ff;text-align:center}
.game{max-width:1000px;margin:auto;padding:20px}
h1{color:#2e7d32}
.world{background:#6ab04c;border:6px solid #3d6b22;border-radius:12px;padding:20px;min-height:540px}
.card{background:white;padding:22px;border-radius:12px;margin-top:20px}
button{display:block;width:92%;max-width:760px;margin:10px auto;padding:14px;font-size:16px;border:0;border-radius:8px;background:#795548;color:white;cursor:pointer}
button:hover{background:#5d4037}
.option-btn{background:#2e7d32}
.selected{background:#1565c0!important}
.skip{background:#e65100}
.hint{background:#f9a825;color:#222}
.hint-box{background:#fff8e1;border:2px solid #f9a825;border-radius:10px;padding:12px;margin:12px auto;max-width:760px;font-weight:bold}
.stats{font-size:18px;margin:10px}
#feedback{font-weight:bold;font-size:18px;margin-top:15px}
.blocks{display:flex;justify-content:center;gap:8px;margin:15px 0;flex-wrap:wrap}
.block{width:38px;height:38px;background:#8b5a2b;border:4px solid #5d3a1a}
.grass{background:#4caf50}.stone{background:#888}.water{background:#2196f3}.gold{background:#fbc02d}
.timer-good{color:#1565c0}.timer-warning{color:#e65100}.timer-danger{color:#b71c1c}
.small{font-size:14px;color:#555}.warning{color:#b71c1c;font-weight:bold}
.progress{background:#ddd;border-radius:20px;overflow:hidden;height:18px;margin:12px auto;max-width:650px}
.progress-bar{height:100%;width:0%;background:#2e7d32}
</style>
</head>

<body>
<div class="game">
<h1>⛏️ Isaac BlockCraft Learning Quest</h1>
<p>Singapore Primary 4 Practice Game</p>

<div class="stats" id="stats" style="display:none;">
📘 Subject: <span id="subjectLabel"></span> |
⭐ Score: <span id="score">0</span> |
✅ Correct: <span id="correct">0</span> |
❌ Wrong: <span id="wrong">0</span> |
⏭️ Skipped: <span id="skipped">0</span> |
💡 Hints: <span id="hintsUsed">0</span> |
⏱️ Time: <span id="timer" class="timer-good">00:00</span>
</div>

<div class="world">
<div id="screen"></div>
<div id="blocks" class="blocks"></div>
</div>
</div>

];

let questionBank=[];
for(let i=0;i<5;i++){
  questions.forEach((q,index)=>{
    questionBank.push({...q,id:q.subject+"-"+q.topic+"-"+index+"-"+i});
  });
}

let selectedSubject="Science";
let selectedTopics=[...subjects.Science];
let allMode=true;
let selectedTotal=20;
let sessionTime=20*60;
let testQuestions=[];
let current=0,score=0,correct=0,wrong=0,skipped=0,hintsUsed=0;
let timerInterval;

function showSetup(){
  clearInterval(timerInterval);
  document.getElementById("stats").style.display="none";
  document.getElementById("blocks").innerHTML="";

  document.getElementById("screen").innerHTML=`
  <div class="card">
    <h2>Choose Your Challenge</h2>

    <h3>1. Select Subject</h3>
    <button class="option-btn ${selectedSubject==="Science"?"selected":""}" onclick="selectSubject('Science')">Science</button>
    <button class="option-btn ${selectedSubject==="Mathematics"?"selected":""}" onclick="selectSubject('Mathematics')">Mathematics</button>

    <h3>2. Select Topics</h3>
    <button id="allTopicsBtn" class="option-btn" onclick="toggleAllTopics()">All Topics</button>
    <div id="topicButtons"></div>

    <h3>3. Select Number of Questions</h3>
    <button id="q20" class="option-btn" onclick="selectTotal(20)">20 Questions</button>
    <button id="q30" class="option-btn" onclick="selectTotal(30)">30 Questions</button>
    <button id="q40" class="option-btn" onclick="selectTotal(40)">40 Questions</button>

    <p id="topicWarning" class="warning"></p>

    <p class="small">
      Click one topic for single-topic practice.<br>
      Click multiple topics to mix topics in one challenge.<br>
      Click All Topics to include everything.<br>
      Timer is for the whole session. Each question has one optional hint.
    </p>

    <button onclick="startTest()">Start Challenge</button>
  </div>`;

  renderTopicButtons();
  refreshTopicButtons();
  refreshQuestionButtons();
}

function selectSubject(subject){
  selectedSubject=subject;
  selectedTopics=[...subjects[subject]];
  allMode=true;
  showSetup();
}

function renderTopicButtons(){
  let html="";
  subjects[selectedSubject].forEach(topic=>{
    html+=`<button id="topic-${safeId(topic)}" class="option-btn" onclick="toggleTopic('${topic}')">${topic}</button>`;
  });
  document.getElementById("topicButtons").innerHTML=html;
}

function toggleTopic(topic){
  if(allMode){
    selectedTopics=[topic];
    allMode=false;
  }else{
    if(selectedTopics.includes(topic)){
      selectedTopics=selectedTopics.filter(t=>t!==topic);
    }else{
      selectedTopics.push(topic);
    }

    allMode = selectedTopics.length === subjects[selectedSubject].length;
  }

  refreshTopicButtons();
}

function toggleAllTopics(){
  if(allMode){
    selectedTopics=[];
    allMode=false;
  }else{
    selectedTopics=[...subjects[selectedSubject]];
    allMode=true;
  }

  refreshTopicButtons();
}

function refreshTopicButtons(){
  subjects[selectedSubject].forEach(topic=>{
    const btn=document.getElementById("topic-"+safeId(topic));
    if(btn) btn.classList.toggle("selected",selectedTopics.includes(topic));
  });

  const allBtn=document.getElementById("allTopicsBtn");
  if(allBtn) allBtn.classList.toggle("selected",allMode);

  const warning=document.getElementById("topicWarning");
  if(warning) warning.innerHTML=selectedTopics.length===0?"Please select at least one topic.":"";
}

function selectTotal(total){
  selectedTotal=total;
  sessionTime=total*60;
  refreshQuestionButtons();
}

function refreshQuestionButtons(){
  [20,30,40].forEach(n=>{
    const btn=document.getElementById("q"+n);
    if(btn) btn.classList.toggle("selected",selectedTotal===n);
  });
}

function startTest(){
  if(selectedTopics.length===0){
    document.getElementById("topicWarning").innerHTML="Please select at least one topic.";
    return;
  }

  current=0;score=0;correct=0;wrong=0;skipped=0;hintsUsed=0;
  document.getElementById("blocks").innerHTML="";

  let pool=questionBank.filter(q=>q.subject===selectedSubject && selectedTopics.includes(q.topic));
  testQuestions=buildRandomTest(pool,selectedTotal);
  sessionTime=selectedTotal*60;

  document.getElementById("stats").style.display="block";
  document.getElementById("subjectLabel").innerHTML=selectedSubject;
  updateStats();
  updateTimer();

  timerInterval=setInterval(()=>{
    sessionTime--;
    updateTimer();
    if(sessionTime<=0) endByTime();
  },1000);

  loadQuestion();
}

function buildRandomTest(pool,total){
  let result=[],available=shuffle([...pool]),lastText="";
  while(result.length<total){
    if(available.length===0) available=shuffle([...pool]);
    let idx=available.findIndex(q=>q.q!==lastText);
    if(idx===-1) idx=0;
    let picked=available.splice(idx,1)[0];
    picked={...picked,hintUsedThisQuestion:false,shuffled:shuffleAnswerOptions(picked.options,picked.answer)};
    result.push(picked);
    lastText=picked.q;
  }
  return result;
}

function shuffleAnswerOptions(options,answerIndex){
  let arr=options.map((text,i)=>({text,correct:i===answerIndex}));
  arr=shuffle(arr);
  return{choices:arr.map(x=>x.text),answer:arr.findIndex(x=>x.correct)};
}

function loadQuestion(){
  const q=testQuestions[current];
  const progress=(current/selectedTotal)*100;

  document.getElementById("screen").innerHTML=`
  <div class="card">
    <h2>${q.subject}: ${q.topic}</h2>
    <p>Question ${current+1} of ${selectedTotal}</p>
    <div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
    <h3>${q.q}</h3>
    <div id="answers"></div>
    <button id="hintBtn" class="hint" onclick="showHint()">💡 Use One-Time Hint</button>
    <div id="hintBox"></div>
    <button class="skip" onclick="skipQuestion()">Skip Question</button>
    <div id="feedback"></div>
  </div>`;

  const answers=document.getElementById("answers");
  q.shuffled.choices.forEach((choice,index)=>{
    const btn=document.createElement("button");
    btn.innerHTML=choice;
    btn.onclick=()=>checkAnswer(index);
    answers.appendChild(btn);
  });
}

function showHint(){
  const q=testQuestions[current];
  if(q.hintUsedThisQuestion) return;

  q.hintUsedThisQuestion=true;
  hintsUsed++;

  document.getElementById("hintBox").innerHTML=`<div class="hint-box">💡 Hint: ${q.hint}</div>`;
  const hintBtn=document.getElementById("hintBtn");
  hintBtn.disabled=true;
  hintBtn.innerHTML="💡 Hint Used";
  updateStats();
}

function checkAnswer(choice){
  const q=testQuestions[current];
  const isCorrect=choice===q.shuffled.answer;

  document.querySelectorAll("#answers button").forEach(b=>b.disabled=true);
  document.getElementById("hintBtn").disabled=true;

  if(isCorrect){
    correct++;
    score+=q.hintUsedThisQuestion?4:5;
    addBlock();
    document.getElementById("feedback").innerHTML=q.hintUsedThisQuestion
    ?"✅ Correct! Hint used, so you earned 4 points. "+q.explain
    :"✅ Correct! "+q.explain;
  }else{
    wrong++;
    document.getElementById("feedback").innerHTML="❌ Not quite. "+q.explain;
  }

  updateStats();
  setTimeout(nextQuestion,1200);
}

function skipQuestion(){
  skipped++;
  updateStats();
  nextQuestion();
}

function nextQuestion(){
  current++;
  if(current>=selectedTotal) showResults(false);
  else loadQuestion();
}

function endByTime(){
  clearInterval(timerInterval);
  showResults(true);
}

function showResults(timeUp){
  clearInterval(timerInterval);
  const attempted=correct+wrong;
  const percentage=Math.round((correct/selectedTotal)*100);

  let grade="";
  if(percentage>=90) grade="🏆 Excellent — Master Level!";
  else if(percentage>=75) grade="🌟 Strong — good exam readiness.";
  else if(percentage>=60) grade="👍 Decent — practise more application questions.";
  else grade="📚 Needs revision — strengthen foundation first.";

  document.getElementById("timer").innerHTML="00:00";

  document.getElementById("screen").innerHTML=`
  <div class="card">
    <h1>${timeUp?"⏱️ Time Up!":"✅ Challenge Complete!"}</h1>
    <h2>${grade}</h2>
    <p><b>Subject:</b> ${selectedSubject}</p>
    <p><b>Topics:</b> ${allMode ? "All Topics" : selectedTopics.join(", ")}</p>
    <p><b>Total Questions:</b> ${selectedTotal}</p>
    <p><b>Attempted:</b> ${attempted}</p>
    <p><b>Correct:</b> ${correct}</p>
    <p><b>Wrong:</b> ${wrong}</p>
    <p><b>Skipped:</b> ${skipped}</p>
    <p><b>Hints Used:</b> ${hintsUsed}</p>
    <p><b>Score:</b> ${score} / ${selectedTotal*5}</p>
    <p><b>Percentage:</b> ${percentage}%</p>
    <button onclick="showSetup()">Start New Challenge</button>
  </div>`;
}

function addBlock(){
  const block=document.createElement("div");
  const types=["block","block grass","block stone","block water","block gold"];
  block.className=types[Math.floor(Math.random()*types.length)];
  document.getElementById("blocks").appendChild(block);
}

function updateStats(){
  document.getElementById("score").innerHTML=score;
  document.getElementById("correct").innerHTML=correct;
  document.getElementById("wrong").innerHTML=wrong;
  document.getElementById("skipped").innerHTML=skipped;
  document.getElementById("hintsUsed").innerHTML=hintsUsed;
}

function updateTimer(){
  const mins=Math.floor(sessionTime/60);
  const secs=sessionTime%60;
  const timer=document.getElementById("timer");
  timer.innerHTML=`${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
  timer.className="timer-good";
  if(sessionTime<=300) timer.className="timer-warning";
  if(sessionTime<=60) timer.className="timer-danger";
}

function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

function safeId(text){
  return text.replace(/\s+/g,"-").replace(/[^a-zA-Z0-9-]/g,"");
}

showSetup();
</script>
