<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BlockCraft Science Quest - Primary 4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial,sans-serif;background:#8fd3ff;text-align:center}
.game{max-width:980px;margin:auto;padding:20px}
h1{color:#2e7d32}
.world{background:#6ab04c;border:6px solid #3d6b22;border-radius:12px;padding:20px;min-height:520px}
.card{background:white;padding:22px;border-radius:12px;margin-top:20px}
button{display:block;width:92%;max-width:720px;margin:10px auto;padding:14px;font-size:16px;border:0;border-radius:8px;background:#795548;color:white;cursor:pointer}
button:hover{background:#5d4037}
.option-btn{background:#2e7d32}
.option-btn:hover{background:#1b5e20}
.selected{background:#1565c0!important}
.skip{background:#e65100}
.hint{background:#f9a825;color:#222}
.hint-box{background:#fff8e1;border:2px solid #f9a825;border-radius:10px;padding:12px;margin:12px auto;max-width:720px;font-weight:bold}
.stats{font-size:18px;margin:10px}
#feedback{font-weight:bold;font-size:18px;margin-top:15px}
.blocks{display:flex;justify-content:center;gap:8px;margin:15px 0;flex-wrap:wrap}
.block{width:38px;height:38px;background:#8b5a2b;border:4px solid #5d3a1a}
.grass{background:#4caf50}.stone{background:#888}.water{background:#2196f3}.gold{background:#fbc02d}
.timer-good{color:#1565c0}.timer-warning{color:#e65100}.timer-danger{color:#b71c1c}
.small{font-size:14px;color:#555}
.warning{color:#b71c1c;font-weight:bold}
.progress{background:#ddd;border-radius:20px;overflow:hidden;height:18px;margin:12px auto;max-width:650px}
.progress-bar{height:100%;width:0%;background:#2e7d32}
</style>
</head>

<body>
<div class="game">
<h1>⛏️ BlockCraft Science Quest</h1>
<p>Singapore Primary 4 Science Practice</p>

<div class="stats" id="stats" style="display:none;">
⭐ Score: <span id="score">0</span> |
✅ Correct: <span id="correct">0</span> |
❌ Wrong: <span id="wrong">0</span> |
⏭️ Skipped: <span id="skipped">0</span> |
💡 Hints Used: <span id="hintsUsed">0</span> |
⏱️ Session Time: <span id="timer" class="timer-good">00:00</span>
</div>

<div class="world">
<div id="screen"></div>
<div id="blocks" class="blocks"></div>
</div>
</div>

<script>
const topics = ["Plants","Matter","Magnets","Forces","Life Cycles","Food Chains"];

const baseQuestions = [
{topic:"Plants",q:"A plant was kept in a dark cupboard but watered daily. After one week, its leaves turned yellow. Why?",options:["It did not get enough sunlight to make food.","It received too much water.","It had no oxygen.","It had too much soil."],answer:0,explain:"Plants need sunlight to make food.",hint:"Think about what plants need to make their own food."},
{topic:"Plants",q:"Two similar plants were given the same amount of water. Plant A was near a window. Plant B was in a box. Which should grow better?",options:["Plant A, because it receives sunlight.","Plant B, because it is protected.","Both will grow the same.","Neither will grow."],answer:0,explain:"Sunlight helps plants make food.",hint:"Compare the amount of light each plant receives."},
{topic:"Plants",q:"A seedling with damaged roots is likely to die. Why?",options:["It cannot absorb enough water and mineral salts.","It cannot attract bees.","It cannot make fruits immediately.","It cannot bend towards light."],answer:0,explain:"Roots absorb water and mineral salts.",hint:"Focus on the function of roots."},
{topic:"Plants",q:"A pupil removed most leaves from a plant. The plant grew poorly. Why?",options:["It could not make enough food.","It could not absorb water.","It became heavier.","It received too much air."],answer:0,explain:"Leaves help plants make food.",hint:"Which plant part traps sunlight?"},
{topic:"Plants",q:"A plant has a weak stem. What problem is it most likely to face?",options:["It may not be held upright properly.","It will not need water.","It will become magnetic.","It will stop losing water completely."],answer:0,explain:"The stem supports the plant.",hint:"Think about which part supports the plant above ground."},

{topic:"Matter",q:"Water droplets formed outside a cold cup. Where did they come from?",options:["Water vapour in the air condensed.","Water leaked through the cup.","The cup melted.","The drink passed through the cup."],answer:0,explain:"Water vapour condenses on cold surfaces.",hint:"The droplets came from the air, not from inside the cup."},
{topic:"Matter",q:"A wet shirt dries faster under the sun. Why?",options:["Heat speeds up evaporation.","Sunlight freezes water.","The shirt absorbs more water.","Air becomes solid."],answer:0,explain:"Heat increases evaporation.",hint:"Drying happens when liquid water changes into water vapour."},
{topic:"Matter",q:"Ice cubes become water after being left outside. What happened?",options:["The ice gained heat and melted.","The ice lost heat and melted.","The water froze.","The air became colder."],answer:0,explain:"Ice melts when it gains heat.",hint:"A solid changes into a liquid when it gains heat."},
{topic:"Matter",q:"A mirror becomes misty after a hot shower. What process causes this?",options:["Condensation","Freezing","Melting","Burning"],answer:0,explain:"Steam cools and condenses on the mirror.",hint:"Gas changes back into tiny liquid droplets."},
{topic:"Matter",q:"Which setup dries a wet towel fastest?",options:["Under the sun with moving air.","In a closed dark cupboard.","Folded tightly in a bag.","Inside a cold fridge."],answer:0,explain:"Heat and moving air increase evaporation.",hint:"Evaporation is faster with heat and moving air."},

{topic:"Magnets",q:"A magnet attracts paper clips but not aluminium foil. What can you conclude?",options:["Only some metals are magnetic.","All metals are magnetic.","Aluminium is heavier.","Paper clips are not metal."],answer:0,explain:"Not all metals are magnetic.",hint:"Do not assume every metal is attracted to magnets."},
{topic:"Magnets",q:"Two magnets push away from each other. What is the likely reason?",options:["Like poles are facing each other.","Unlike poles are facing each other.","They are too heavy.","They have no poles."],answer:0,explain:"Like poles repel.",hint:"Same poles do not attract."},
{topic:"Magnets",q:"A steel pin moves towards a magnet even with paper between them. What does this show?",options:["Magnetic force can pass through some materials.","Paper is magnetic.","The pin became lighter.","The magnet touched the pin."],answer:0,explain:"Magnetic force can act through paper.",hint:"The magnet did not touch the pin, but still affected it."},
{topic:"Magnets",q:"A pupil wants to find out which material is magnetic. What should he do?",options:["Bring a magnet near each material.","Weigh each material.","Put each material in water.","Heat each material."],answer:0,explain:"A magnet tests magnetic attraction.",hint:"Use the tool that can attract magnetic materials."},
{topic:"Magnets",q:"Which object is most likely to be attracted by a magnet?",options:["Steel nail","Plastic ruler","Wooden chopstick","Rubber band"],answer:0,explain:"Steel is magnetic.",hint:"Look for iron or steel."},

{topic:"Forces",q:"A toy car travels further on smooth tiles than on carpet. Why?",options:["There is less friction on tiles.","There is more gravity on carpet.","The car is heavier on carpet.","Tiles push the car."],answer:0,explain:"Less friction allows it to travel further.",hint:"Rough surfaces slow moving objects more."},
{topic:"Forces",q:"A ball slows down after rolling on the floor. Which force causes this?",options:["Friction","Magnetism","Light","Electricity"],answer:0,explain:"Friction slows moving objects.",hint:"This force acts against motion."},
{topic:"Forces",q:"A pupil rubs his hands together and feels warmth. Why?",options:["Friction produces heat.","Gravity produces heat.","Air turns into fire.","Hands become magnetic."],answer:0,explain:"Friction can produce heat.",hint:"Rubbing two surfaces together can produce heat."},
{topic:"Forces",q:"Why do shoes usually have grooves at the bottom?",options:["To increase friction and prevent slipping.","To reduce weight only.","To make shoes magnetic.","To absorb sunlight."],answer:0,explain:"Grooves increase friction.",hint:"Think about grip."},
{topic:"Forces",q:"A heavier book is harder to push than a lighter book on the same table. Why?",options:["There is usually more friction.","There is less gravity.","It has no mass.","It becomes sticky."],answer:0,explain:"Heavier objects may have more friction.",hint:"A heavier object presses harder against the surface."},

{topic:"Life Cycles",q:"A caterpillar was found after eggs hatched on a leaf. Which animal is likely being observed?",options:["Butterfly","Chicken","Fish","Cat"],answer:0,explain:"Butterfly eggs hatch into caterpillars.",hint:"Which animal has a caterpillar stage?"},
{topic:"Life Cycles",q:"A tadpole develops legs and later becomes an adult frog. What is this change called?",options:["Metamorphosis","Evaporation","Condensation","Magnetisation"],answer:0,explain:"Frogs undergo metamorphosis.",hint:"This is a big body-form change during growth."},
{topic:"Life Cycles",q:"Why are fruits important in a plant life cycle?",options:["They contain seeds for reproduction.","They absorb water.","They hold the plant upright.","They make all food."],answer:0,explain:"Fruits usually contain seeds.",hint:"Think about how new plants grow."},
{topic:"Life Cycles",q:"Which stage comes after caterpillar in a butterfly life cycle?",options:["Pupa","Egg","Adult fish","Seed"],answer:0,explain:"The caterpillar changes into a pupa.",hint:"It is the stage before the adult butterfly."},
{topic:"Life Cycles",q:"A seed needs suitable conditions to germinate. Which is usually needed?",options:["Water","Paint","Magnet","Smoke"],answer:0,explain:"Seeds need water to germinate.",hint:"A dry seed usually will not start growing."},

{topic:"Food Chains",q:"Grass → Grasshopper → Frog → Snake. If grass decreases greatly, what may happen?",options:["Grasshoppers may decrease.","Frogs will make food.","Snakes become producers.","Grasshoppers need no food."],answer:0,explain:"Grasshoppers depend on grass.",hint:"Look at the organism that eats grass directly."},
{topic:"Food Chains",q:"Grass → Rabbit → Eagle. If rabbits decrease, what may happen to eagles?",options:["Eagles may have less food.","Eagles will eat grass only.","Eagles become plants.","Rabbits become producers."],answer:0,explain:"Eagles depend on rabbits.",hint:"What does the eagle eat in this food chain?"},
{topic:"Food Chains",q:"Which organism is the producer in a food chain?",options:["Green plant","Rabbit","Snake","Eagle"],answer:0,explain:"Green plants make their own food.",hint:"Producers make their own food."},
{topic:"Food Chains",q:"A pond has water plants, small fish and big fish. If small fish decrease, what happens?",options:["Big fish may have less food.","Water plants disappear immediately.","Big fish make food.","Small fish become producers."],answer:0,explain:"Big fish depend on small fish.",hint:"Follow the food relationship from prey to predator."},
{topic:"Food Chains",q:"Why does every food chain usually begin with a plant?",options:["Plants can make their own food.","Plants eat animals.","Plants hunt insects only.","Plants do not need sunlight."],answer:0,explain:"Plants are producers.",hint:"Plants are the starting source of food energy."}
];

let questionBank = [];
for(let i=0;i<6;i++){
  baseQuestions.forEach((q,index)=>{
    questionBank.push({
      ...q,
      id:q.topic + "-" + index + "-v" + i
    });
  });
}

let selectedTopics = [...topics];
let selectedTotal = 20;
let sessionTime = 20 * 60;
let testQuestions = [];
let current = 0;
let score = 0;
let correct = 0;
let wrong = 0;
let skipped = 0;
let hintsUsed = 0;
let timerInterval;

function showSetup(){
  clearInterval(timerInterval);
  document.getElementById("stats").style.display = "none";
  document.getElementById("blocks").innerHTML = "";

  let html = `
  <div class="card">
    <h2>Choose Your Science Challenge</h2>

    <h3>1. Select Topics</h3>
    <button id="allTopicsBtn" class="option-btn selected" onclick="toggleAllTopics()">All Topics</button>
  `;

  topics.forEach(topic=>{
    html += `<button id="topic-${topic}" class="option-btn selected" onclick="toggleTopic('${topic}')">${topic}</button>`;
  });

  html += `
    <h3>2. Select Number of Questions</h3>
    <button id="q20" class="option-btn selected" onclick="selectTotal(20)">20 Questions</button>
    <button id="q30" class="option-btn" onclick="selectTotal(30)">30 Questions</button>
    <button id="q40" class="option-btn" onclick="selectTotal(40)">40 Questions</button>

    <p id="topicWarning" class="warning"></p>

    <p class="small">
      Timer is for the whole session, not each question.<br>
      20 questions = 20 minutes, 30 questions = 30 minutes, 40 questions = 40 minutes.<br>
      Each question has one optional hint.
    </p>

    <button onclick="startTest()">Start Challenge</button>
  </div>`;

  document.getElementById("screen").innerHTML = html;
  refreshTopicButtons();
}

function toggleTopic(topic){
  if(selectedTopics.includes(topic)){
    selectedTopics = selectedTopics.filter(t=>t!==topic);
  }else{
    selectedTopics.push(topic);
  }
  refreshTopicButtons();
}

function toggleAllTopics(){
  if(selectedTopics.length === topics.length){
    selectedTopics = [];
  }else{
    selectedTopics = [...topics];
  }
  refreshTopicButtons();
}

function refreshTopicButtons(){
  topics.forEach(topic=>{
    const btn = document.getElementById("topic-" + topic);
    if(btn){
      btn.classList.toggle("selected", selectedTopics.includes(topic));
    }
  });

  const allBtn = document.getElementById("allTopicsBtn");
  if(allBtn){
    allBtn.classList.toggle("selected", selectedTopics.length === topics.length);
  }

  const warning = document.getElementById("topicWarning");
  if(warning){
    warning.innerHTML = selectedTopics.length === 0 ? "Please select at least one topic." : "";
  }
}

function selectTotal(total){
  selectedTotal = total;
  sessionTime = total * 60;

  [20,30,40].forEach(n=>{
    document.getElementById("q" + n).classList.remove("selected");
  });

  document.getElementById("q" + total).classList.add("selected");
}

function startTest(){
  if(selectedTopics.length === 0){
    document.getElementById("topicWarning").innerHTML = "Please select at least one topic.";
    return;
  }

  score = 0;
  correct = 0;
  wrong = 0;
  skipped = 0;
  hintsUsed = 0;
  current = 0;
  document.getElementById("blocks").innerHTML = "";

  let pool = questionBank.filter(q=>selectedTopics.includes(q.topic));

  testQuestions = buildRandomTest(pool, selectedTotal);

  sessionTime = selectedTotal * 60;

  document.getElementById("stats").style.display = "block";
  updateStats();
  updateTimer();

  timerInterval = setInterval(()=>{
    sessionTime--;
    updateTimer();
    if(sessionTime <= 0){
      endByTime();
    }
  },1000);

  loadQuestion();
}

function buildRandomTest(pool,total){
  let result = [];
  let available = shuffle([...pool]);
  let lastQuestionText = "";

  while(result.length < total){
    if(available.length === 0){
      available = shuffle([...pool]);
    }

    let pickedIndex = available.findIndex(q=>q.q !== lastQuestionText);

    if(pickedIndex === -1){
      pickedIndex = 0;
    }

    let picked = available.splice(pickedIndex,1)[0];

    picked = {
      ...picked,
      hintUsedThisQuestion:false,
      shuffled: shuffleAnswerOptions(picked.options, picked.answer)
    };

    result.push(picked);
    lastQuestionText = picked.q;
  }

  return result;
}

function shuffleAnswerOptions(options,answerIndex){
  let arr = options.map((text,i)=>({text,correct:i===answerIndex}));
  arr = shuffle(arr);
  return {
    choices: arr.map(x=>x.text),
    answer: arr.findIndex(x=>x.correct)
  };
}

function loadQuestion(){
  const q = testQuestions[current];
  const progress = (current / selectedTotal) * 100;

  document.getElementById("screen").innerHTML = `
  <div class="card">
    <h2>${q.topic}</h2>
    <p>Question ${current + 1} of ${selectedTotal}</p>
    <div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
    <h3>${q.q}</h3>
    <div id="answers"></div>
    <button id="hintBtn" class="hint" onclick="showHint()">💡 Use One-Time Hint</button>
    <div id="hintBox"></div>
    <button class="skip" onclick="skipQuestion()">Skip Question</button>
    <div id="feedback"></div>
  </div>`;

  const answers = document.getElementById("answers");

  q.shuffled.choices.forEach((choice,index)=>{
    const btn = document.createElement("button");
    btn.innerHTML = choice;
    btn.onclick = ()=>checkAnswer(index);
    answers.appendChild(btn);
  });
}

function showHint(){
  const q = testQuestions[current];

  if(q.hintUsedThisQuestion) return;

  q.hintUsedThisQuestion = true;
  hintsUsed++;

  document.getElementById("hintBox").innerHTML = `
    <div class="hint-box">💡 Hint: ${q.hint}</div>
  `;

  const hintBtn = document.getElementById("hintBtn");
  hintBtn.disabled = true;
  hintBtn.innerHTML = "💡 Hint Used";

  updateStats();
}

function checkAnswer(choice){
  const q = testQuestions[current];
  const isCorrect = choice === q.shuffled.answer;

  document.querySelectorAll("#answers button").forEach(b=>b.disabled=true);
  document.getElementById("hintBtn").disabled = true;

  if(isCorrect){
    correct++;
    score += q.hintUsedThisQuestion ? 4 : 5;
    addBlock();
    document.getElementById("feedback").innerHTML =
      q.hintUsedThisQuestion
      ? "✅ Correct! You used a hint, so you earned 4 points. " + q.explain
      : "✅ Correct! " + q.explain;
  }else{
    wrong++;
    document.getElementById("feedback").innerHTML = "❌ Not quite. " + q.explain;
  }

  updateStats();
  setTimeout(nextQuestion,1300);
}

function skipQuestion(){
  skipped++;
  updateStats();
  nextQuestion();
}

function nextQuestion(){
  current++;
  if(current >= selectedTotal){
    showResults(false);
  }else{
    loadQuestion();
  }
}

function endByTime(){
  clearInterval(timerInterval);
  showResults(true);
}

function showResults(timeUp){
  clearInterval(timerInterval);

  const attempted = correct + wrong;
  const percentage = Math.round((correct / selectedTotal) * 100);

  let grade = "";
  if(percentage >= 90) grade = "🏆 Excellent — Science Master!";
  else if(percentage >= 75) grade = "🌟 Strong — good exam readiness.";
  else if(percentage >= 60) grade = "👍 Decent — practise more application questions.";
  else grade = "📚 Weak foundation — revise before trying again.";

  document.getElementById("timer").innerHTML = "00:00";

  document.getElementById("screen").innerHTML = `
  <div class="card">
    <h1>${timeUp ? "⏱️ Time Up!" : "✅ Challenge Complete!"}</h1>
    <h2>${grade}</h2>

    <p><b>Topics:</b> ${selectedTopics.join(", ")}</p>
    <p><b>Total Questions:</b> ${selectedTotal}</p>
    <p><b>Attempted:</b> ${attempted}</p>
    <p><b>Correct:</b> ${correct}</p>
    <p><b>Wrong:</b> ${wrong}</p>
    <p><b>Skipped:</b> ${skipped}</p>
    <p><b>Hints Used:</b> ${hintsUsed}</p>
    <p><b>Score:</b> ${score} / ${selectedTotal * 5}</p>
    <p><b>Percentage:</b> ${percentage}%</p>

    <button onclick="showSetup()">Start New Challenge</button>
  </div>`;
}

function addBlock(){
  const block = document.createElement("div");
  const types = ["block","block grass","block stone","block water","block gold"];
  block.className = types[Math.floor(Math.random()*types.length)];
  document.getElementById("blocks").appendChild(block);
}

function updateStats(){
  document.getElementById("score").innerHTML = score;
  document.getElementById("correct").innerHTML = correct;
  document.getElementById("wrong").innerHTML = wrong;
  document.getElementById("skipped").innerHTML = skipped;
  document.getElementById("hintsUsed").innerHTML = hintsUsed;
}

function updateTimer(){
  const mins = Math.floor(sessionTime / 60);
  const secs = sessionTime % 60;
  const timer = document.getElementById("timer");

  timer.innerHTML = `${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;

  timer.className = "timer-good";
  if(sessionTime <= 300) timer.className = "timer-warning";
  if(sessionTime <= 60) timer.className = "timer-danger";
}

function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

showSetup();
</script>
</body>
</html>
